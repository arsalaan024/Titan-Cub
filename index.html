<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Titan Club | Official Campus Portal</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            maroon: {
              50: '#fdf2f2',
              100: '#fde8e8',
              200: '#fbd5d5',
              300: '#f8b4b4',
              400: '#f98080',
              500: '#ee4242',
              600: '#c81e1e',
              700: '#9b1c1c',
              800: '#800000',
              900: '#771d1d'
            }
          },
          animation: {
            'fade-in': 'fadeIn 0.5s ease-out forwards',
            'slide-up': 'slideUp 0.6s ease-out forwards',
            'ribbon-swing': 'swing 4s ease-in-out infinite',
            'pull-ribbon': 'pull 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275)'
          },
          keyframes: {
            fadeIn: {
              '0%': { opacity: '0' },
              '100%': { opacity: '1' },
            },
            slideUp: {
              '0%': { transform: 'translateY(30px)', opacity: '0' },
              '100%': { transform: 'translateY(0)', opacity: '1' },
            },
            swing: {
              '0%, 100%': { transform: 'rotate(-0.8deg)' },
              '50%': { transform: 'rotate(0.8deg)' },
            },
            pull: {
              '0%, 100%': { transform: 'translateY(0)' },
              '50%': { transform: 'translateY(50px)' },
            }
          }
        }
      }
    }
  </script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');

    body {
      font-family: 'Inter', sans-serif;
      scroll-behavior: smooth;
      background-color: #fcfcfc;
    }

    .scroll-hide::-webkit-scrollbar {
      display: none;
    }

    .scroll-hide {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }

    .glass {
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    .vertical-text {
      writing-mode: vertical-rl;
      text-orientation: mixed;
    }

    .ribbon-gradient {
      background: linear-gradient(180deg, #800000 0%, #600000 100%);
      box-shadow: inset -5px 0 10px rgba(0, 0, 0, 0.2);
    }

    .dark-ribbon-gradient {
      background: linear-gradient(180deg, #1a1a1a 0%, #000000 100%);
      box-shadow: inset -5px 0 10px rgba(255, 255, 255, 0.05);
    }
  </style>
  <link rel="stylesheet" href="/index.css">
</head>

<body class="bg-gray-50 text-gray-900 selection:bg-maroon-100 selection:text-maroon-900">
  <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>

</html>
